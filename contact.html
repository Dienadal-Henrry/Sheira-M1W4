 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheira-M1W4 - Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .menu-btn{width:60px;height:60px;border:3px solid #777;border-radius:15px;display:flex;justify-content:center;align-items:center;cursor:pointer;font-size:30px;color:#fff;transition:.3s}
        .menu-btn:hover{background:rgba(255,255,255,.1)}
        #menu{display:none;background:#162346;width:100%}
        #menu.show{display:block}
        #menu a{display:block;color:#fff;text-decoration:none;padding:15px 20px;border-top:1px solid rgba(255,255,255,.2);font-size:18px;transition:.3s}
        #menu a:hover{background:rgba(255,255,255,.1)}
        input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:5px;font-size:16px;transition:.3s}
        input:focus,textarea:focus{outline:none;border-color:#1a4a8d;box-shadow:0 0 0 3px rgba(26,74,141,.1)}
        button{background:#1a4a8d;color:#fff;padding:12px 30px;border:none;border-radius:5px;font-size:18px;cursor:pointer;transition:.3s}
        button:hover{background:#0d3a7c}
    </style>
</head>
<body class="bg-[#f5f7fa] min-h-screen flex flex-col">

<header class="bg-[#162346] text-white h-[75px] flex flex-wrap items-center px-[25px]">
    <h2 class="text-[28px] font-bold flex-1">Sheira-M1W4</h2>
    <div class="menu-btn" onclick="document.getElementById('menu').classList.toggle('show')">☰</div>
</header>

<nav id="menu">
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
</nav>

<main class="flex-1 container mx-auto px-4 py-8">
    <section class="mb-8">
        <h2 class="text-3xl font-bold text-[#333] mb-4">Contact Us</h2>
        <div class="bg-white p-6 rounded-lg shadow-md">
            <ul class="space-y-3">
                <li class="flex items-center">
                    <i class="fas fa-envelope text-[#1a4a8d] text-xl mr-3"></i>
                    <a href="mailto:sheira@example.com" class="text-[#1a4a8d] hover:underline text-lg">sheira@example.com</a>
                </li>
                
            </ul>
        </div>
    </section>

    <section class="bg-white p-8 rounded-lg shadow-md max-w-2xl">
        <h3 class="text-2xl font-bold text-[#333] mb-6">Send a Message</h3>
        <form onsubmit="event.preventDefault();alert('Thank you! We\'ll get back soon.');this.reset()">
            <div class="mb-4">
                <label class="block text-[#333] font-medium mb-2">Name:</label>
                <input type="text" required>
            </div>
            <div class="mb-4">
                <label class="block text-[#333] font-medium mb-2">Email:</label>
                <input type="email" required>
            </div>
            <div class="mb-6">
                <label class="block text-[#333] font-medium mb-2">Message:</label>
                <textarea rows="5" required></textarea>
            </div>
            <button type="submit" class="w-full md:w-auto">Send Message</button>
        </form>
    </section>
</main>

<footer class="bg-[#111] text-white text-center py-[15px]">
    <p>&copy; 2026 sheira-m1w4</p>
</footer>

</body>
</html>
