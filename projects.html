<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheira-M1W4 - Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card-hover:hover{transform:translateY(-8px);box-shadow:0 8px 20px rgba(0,0,0,.15)}
        .menu-btn{width:60px;height:60px;border:3px solid #777;border-radius:15px;display:flex;justify-content:center;align-items:center;cursor:pointer;font-size:30px;color:#fff;transition:.3s}
        .menu-btn:hover{background:rgba(255,255,255,.1)}
        #menu{display:none;background:#162346;width:100%}
        #menu.show{display:block}
        #menu a{display:block;color:#fff;text-decoration:none;padding:15px 20px;border-top:1px solid rgba(255,255,255,.2);font-size:18px;transition:.3s}
        #menu a:hover{background:rgba(255,255,255,.1)}
        .dark #menu{background:#0d1b2a}
    </style>
</head>
<body class="bg-[#f5f7fa] dark:bg-gray-900 min-h-screen flex flex-col transition-colors duration-300">

<header class="bg-[#162346] dark:bg-[#0d1b2a] text-white h-[75px] flex justify-between items-center px-[25px] transition-colors duration-300">
    <div class="flex items-center flex-1">
        <h2 class="text-[28px] font-bold">Sheira-M1W4</h2>
    </div>
    
    <div class="flex items-center gap-3">
        <!-- Dark Mode Toggle -->
        <button id="themeToggle" class="w-[50px] h-[28px] rounded-full bg-gray-300 dark:bg-[#1a4a8d] relative transition-colors duration-300 flex-shrink-0">
            <span class="absolute top-[3px] left-[3px] w-[22px] h-[22px] bg-white rounded-full shadow-md transition-all duration-300 dark:translate-x-[22px]"></span>
            <i class="fas fa-moon absolute top-1/2 -translate-y-1/2 left-[6px] text-[12px] text-gray-600 dark:text-[#ffd700]"></i>
            <i class="fas fa-sun absolute top-1/2 -translate-y-1/2 right-[6px] text-[12px] text-[#ffd700]"></i>
        </button>
        
        <div class="menu-btn" onclick="document.getElementById('menu').classList.toggle('show')">☰</div>
    </div>
</header>

<nav id="menu">
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="contact.html">Contact</a>
</nav>

<main class="flex-1">
    <section class="w-[90%] max-w-[1100px] mx-auto my-[50px] grid grid-cols-1 md:grid-cols-2 gap-[35px]">
        <div class="bg-white dark:bg-[#16213e] p-[45px_30px] rounded-[18px] text-center shadow-[0_4px_10px_rgba(0,0,0,.08)] dark:shadow-[0_4px_10px_rgba(0,0,0,.3)] transition-all duration-300 card-hover">
            <i class=" text-[#1b2d6b] dark:text-[#4a7fc1] mb-[25px]"></i>
            <h3 class="text-[36px] md:text-[28px] mb-[18px] text-[#333] dark:text-[#e0e0e0]">Talent</h3>
            <p class="text-[22px] md:text-[18px] text-[#666] dark:text-[#b0b0b0]">Memorization, Multitasking, Conflict-resolution, Brainstorming.</p>
        </div>
        <div class="bg-white dark:bg-[#16213e] p-[45px_30px] rounded-[18px] text-center shadow-[0_4px_10px_rgba(0,0,0,.08)] dark:shadow-[0_4px_10px_rgba(0,0,0,.3)] transition-all duration-300 card-hover">
            <i class="text-[50px] text-[#1b2d6b] dark:text-[#4a7fc1] mb-[25px]"></i>
            <h3 class="text-[36px] md:text-[28px] mb-[18px] text-[#333] dark:text-[#e0e0e0]">Hobby</h3>
            <p class="text-[22px] md:text-[18px] text-[#666] dark:text-[#b0b0b0]">Writing, Cooking, Reading.</p>
        </div>
        <div class="bg-white dark:bg-[#16213e] p-[45px_30px] rounded-[18px] text-center shadow-[0_4px_10px_rgba(0,0,0,.08)] dark:shadow-[0_4px_10px_rgba(0,0,0,.3)] transition-all duration-300 card-hover">
            <i class="text-[#1b2d6b] dark:text-[#4a7fc1] mb-[25px]"></i>
            <h3 class="text-[36px] md:text-[28px] mb-[18px] text-[#333] dark:text-[#e0e0e0]">Vision</h3>
        </div>
        
    </section>
</main>

<footer class="bg-[#111] text-white text-center py-[15px]">
    <p>&copy; 2026 sheira-m1w4</p>
</footer>

<script>
const toggleBtn = document.getElementById('themeToggle');
toggleBtn.addEventListener('click', function() {
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
});
if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.classList.add('dark');
}
</script>

</body>
</html>
